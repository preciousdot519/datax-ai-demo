<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataX AI - Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
  </style>
</head>
<body class="min-h-screen text-white">
  <nav class="border-b border-white/10 bg-black/30 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold">DataX AI</h1>
        <span class="text-sky-400 text-sm">AI SaaS Platform</span>
      </div>
      <div class="flex items-center gap-6">
        <span id="greeting" class="text-sm"></span>
        <button onclick="logout()" 
                class="px-5 py-2 bg-white/10 hover:bg-white/20 rounded-2xl text-sm transition">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-semibold mb-2">Welcome back, <span id="username" class="text-sky-400"></span>!</h2>
    <p class="text-gray-400">Your AI-powered workspace</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
      <div class="bg-white/10 border border-white/20 rounded-3xl p-8">
        <h3 class="font-semibold text-xl mb-4">AI Models</h3>
        <p class="text-5xl font-bold text-sky-400">12</p>
        <p class="text-sm text-gray-400 mt-2">Active models</p>
      </div>
      <div class="bg-white/10 border border-white/20 rounded-3xl p-8">
        <h3 class="font-semibold text-xl mb-4">Analytics</h3>
        <p class="text-5xl font-bold">98.4%</p>
        <p class="text-sm text-gray-400 mt-2">Average accuracy</p>
      </div>
      <div class="bg-white/10 border border-white/20 rounded-3xl p-8">
        <h3 class="font-semibold text-xl mb-4">Usage</h3>
        <p class="text-5xl font-bold">2.4k</p>
        <p class="text-sm text-gray-400 mt-2">Tokens today</p>
      </div>
    </div>

    <div class="mt-12 bg-white/10 border border-white/20 rounded-3xl p-8">
      <h3 class="font-semibold text-xl mb-6">Quick Actions</h3>
      <div class="grid grid-cols-2 gap-4">
        <button onclick="alert('Feature coming soon in the real product!')" 
                class="p-6 bg-white/5 hover:bg-white/10 rounded-2xl text-left transition">
          <div class="font-medium">Train New Model</div>
          <div class="text-sm text-gray-400">Start a new AI training job</div>
        </button>
        <button onclick="alert('Feature coming soon in the real product!')" 
                class="p-6 bg-white/5 hover:bg-white/10 rounded-2xl text-left transition">
          <div class="font-medium">View Reports</div>
          <div class="text-sm text-gray-400">Access analytics dashboard</div>
        </button>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('loggedIn')) {
      window.location.href = 'index.html';
    }

    const user = localStorage.getItem('user') || 'Demo User';
    document.getElementById('username').textContent = user;
    document.getElementById('greeting').textContent = `Hello, ${user.split('@')[0]}`;

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
